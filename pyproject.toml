[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "med-autogrant"
version = "0.1.0"
description = "Medical grant authoring domain agent for NSFC-oriented workflows."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "Gao Feng" }
]
dependencies = [
    "hermes-agent[acp]",
    "opl-harness-shared @ git+https://github.com/gaofeng21cn/one-person-lab.git@cd634e6406fa264274f01862a7bdc87f552fcb50#subdirectory=python/opl-harness-shared",
]

[project.scripts]
medautogrant = "med_autogrant.cli:entrypoint"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "meta: repo-tracked program control and repository hygiene checks",
  "smoke: minimal CLI/product/runtime entry health checks",
  "integration: cross-surface integration checks that are broader than unit contracts",
  "regression: heavier matrix, historical compatibility, runtime/export, and product regression checks",
  "structure: repository structure and architecture governance checks",
]

[tool.uv.sources]
hermes-agent = { git = "https://github.com/NousResearch/hermes-agent.git", rev = "96051955755a83f22afed5e3501d447462fbe9c8" }

[dependency-groups]
dev = [
    "pytest>=9,<10",
]
