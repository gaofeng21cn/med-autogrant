[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "med-autogrant"
version = "0.1.0"
description = "Medical grant authoring scaffold for NSFC-oriented workflows."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "Gao Feng" }
]
dependencies = [
    "hermes-agent[acp]",
    "opl-harness-shared @ git+https://github.com/gaofeng21cn/one-person-lab.git@3933df75d80473d4cf1831353e479333f823a4ae#subdirectory=python/opl-harness-shared",
]

[project.scripts]
medautogrant = "med_autogrant.cli:entrypoint"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "meta: repo-tracked program control and repository hygiene checks",
]

[tool.uv.sources]
hermes-agent = { git = "https://github.com/NousResearch/hermes-agent.git", rev = "96051955755a83f22afed5e3501d447462fbe9c8" }

[dependency-groups]
dev = [
    "pytest>=9,<10",
]
