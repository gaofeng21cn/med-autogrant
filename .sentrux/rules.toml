[constraints]
min_quality = 0.59
max_cycles = 0
max_depth = 14
no_god_files = false

[[layers]]
name = "entry"
paths = ["src/med_autogrant/cli.py", "src/med_autogrant/product_entry.py"]
order = 1

[[layers]]
name = "product_entry"
paths = ["src/med_autogrant/product_entry_parts/**"]
order = 2

[[layers]]
name = "domain_logic"
paths = ["src/med_autogrant/workspace*.py", "src/med_autogrant/*executor.py", "src/med_autogrant/*controller.py"]
order = 3

[[layers]]
name = "export_package"
paths = ["src/med_autogrant/artifact_bundle.py", "src/med_autogrant/final_package.py", "src/med_autogrant/hosted_contract_bundle.py", "src/med_autogrant/submission_ready.py"]
order = 4

[[boundaries]]
from = "export_package"
to = "entry"
reason = "package/export builders must not call entry facades"

[[boundaries]]
from = "domain_logic"
to = "entry"
reason = "domain logic must not depend on public entry facades"

[[boundaries]]
from = "product_entry"
to = "entry"
reason = "product-entry parts should stay below public entry facades"
